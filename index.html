<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イベント出席回答フォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
        .container {
            max-width: 500px;
            margin: 2rem auto;
        }
    </style>
</head>
<body class="p-4">

    <div class="container bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <h1 class="text-2xl font-bold text-center text-gray-800">イベント出席回答</h1>
        
        <!-- 日付・期日セクション -->
        <div class="text-center mt-4 mb-8 bg-blue-50 p-5 rounded-xl border border-blue-100">
            <p class="text-blue-700 font-bold text-xl">開催日：4月18日（土）</p>
            <p class="text-red-500 text-sm font-bold mt-2">回答期日：3月29日（日）まで</p>
        </div>
        
        <form id="attendanceForm" class="space-y-8">
            <!-- お名前入力 -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">お名前</label>
                <input type="text" id="userName" required 
                    class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="例：山田 太郎">
            </div>

            <!-- 出欠選択 -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-4">ご出欠</label>
                <div class="flex space-x-12">
                    <label class="flex items-center cursor-pointer group">
                        <input type="radio" name="status" value="出席" checked class="w-6 h-6 text-blue-600 focus:ring-blue-500 border-gray-300">
                        <span class="ml-3 text-gray-700 text-xl font-medium group-hover:text-blue-600 transition">出席</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="radio" name="status" value="欠席" class="w-6 h-6 text-blue-600 focus:ring-blue-500 border-gray-300">
                        <span class="ml-3 text-gray-700 text-xl font-medium group-hover:text-red-600 transition">欠席</span>
                    </label>
                </div>
            </div>

            <!-- 送信ボタン -->
            <div class="pt-4">
                <button type="submit" 
                    class="w-full bg-blue-600 text-white font-bold py-4 px-4 rounded-xl hover:bg-blue-700 active:transform active:scale-95 transition duration-200 shadow-lg text-lg">
                    回答をメールで送信する
                </button>
                <div class="mt-4 p-3 bg-gray-50 rounded-lg border border-dashed border-gray-300">
                    <p class="text-[11px] text-gray-500 text-center leading-relaxed">
                        【送信方法】<br>
                        ボタンを押すとメールソフトが自動で起動します。<br>
                        宛先や本文は自動入力されますので、そのまま「送信」を押してください。
                    </p>
                </div>
            </div>
        </form>

        <!-- 送信後のフィードバック表示 -->
        <div id="responseBox" class="hidden mt-6 p-4 bg-green-100 border border-green-200 rounded-lg text-green-800 text-center font-bold">
            メール作成画面へ移動します...
        </div>

        <!-- 送信履歴（ブラウザ保存） -->
        <div class="mt-12 border-t border-gray-100 pt-6">
            <h2 class="text-[10px] font-black text-gray-400 mb-4 uppercase tracking-[0.2em] text-center">最近の送信履歴</h2>
            <ul id="attendanceList" class="space-y-3">
                <li class="text-xs text-gray-400 italic text-center py-4 bg-gray-50 rounded-lg border border-dashed border-gray-200">
                    まだ送信履歴はありません
                </li>
            </ul>
        </div>
    </div>

    <script>
        const form = document.getElementById('attendanceForm');
        const responseBox = document.getElementById('responseBox');
        const list = document.getElementById('attendanceList');
        const targetEmail = "ytakeuchi1121@gmail.com";

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('userName').value;
            const status = document.querySelector('input[name="status"]:checked').value;
            const eventDate = "4月18日（土）";

            // 1. メール内容の設定
            const subject = encodeURIComponent(`【出欠回答】${name}様：${status}`);
            const body = encodeURIComponent(
                `以下の通り、出欠回答を送信します。\n\n` +
                `--------------------------\n` +
                `イベント開催日: ${eventDate}\n` +
                `お名前: ${name}\n` +
                `回答: ${status}\n` +
                `--------------------------\n` +
                `送信日時: ${new Date().toLocaleString('ja-JP')}\n\n` +
                `※このメールはフォームの送信ボタンから作成されました。`
            );

            // 2. メーラーの起動
            window.location.href = `mailto:${targetEmail}?subject=${subject}&body=${body}`;

            // 3. 画面上の履歴を更新
            if (list.querySelector('.italic')) {
                list.innerHTML = '';
            }
            const li = document.createElement('li');
            li.className = "p-4 bg-gray-50 rounded-xl border border-gray-200 flex justify-between items-center shadow-sm";
            li.innerHTML = `
                <div>
                    <span class="font-bold text-gray-800 text-base">${name}</span> 
                    <span class="ml-2 px-2 py-0.5 text-[10px] font-bold rounded-full ${status === '出席' ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700'}">${status}</span>
                </div>
                <span class="text-[10px] text-gray-400 font-mono">${new Date().toLocaleTimeString()}</span>
            `;
            list.prepend(li);

            // 4. 通知を表示してリセット
            responseBox.classList.remove('hidden');
            setTimeout(() => {
                responseBox.classList.add('hidden');
                form.reset();
            }, 4000);
        });
    </script>
</body>
</html>
